name: Docker

on:
  workflow_call:
    outputs:
      tag:
        description: The tag of the image
        value: ${{ jobs.check-image.outputs.tag }}

jobs:
  check-image:
    name: Check if image exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    outputs:
      exists: ${{ steps.check.outputs.exists }}
      tag: ${{ steps.hash.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/images/Dockerfile
            Cargo.lock
            Cargo.toml
            teletel/Cargo.toml
            teletel-protocol/Cargo.toml
            teletel-derive/Cargo.toml
            minitel-emulator/Cargo.toml
            examples/hello/Cargo.toml
            examples/semigraphic/Cargo.toml
            examples/load-vdt/Cargo.toml
          sparse-checkout-cone-mode: false

      - name: Calculate hash
        id: hash
        run: |
          TAG=$(cat \
            .github/images/Dockerfile \
            Cargo.lock \
            Cargo.toml \
            teletel/Cargo.toml \
            teletel-protocol/Cargo.toml \
            teletel-derive/Cargo.toml \
            minitel-emulator/Cargo.toml \
            examples/hello/Cargo.toml \
            examples/semigraphic/Cargo.toml \
            examples/load-vdt/Cargo.toml \
            | sha256sum | cut -c 1-16)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          GHCR_TOKEN=$(echo -n "${{ secrets.GITHUB_TOKEN }}" | base64)
          TAGS=$(curl -s -H "Authorization: Bearer $GHCR_TOKEN" https://ghcr.io/v2/${{ github.repository }}/tags/list)

          if echo "$TAGS" | grep -q "\"${{ steps.hash.outputs.tag }}\""; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-image:
    name: Build docker image
    needs: check-image
    if: needs.check-image.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/images/Dockerfile
          target: ci
          push: true
          sbom: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.check-image.outputs.tag }}
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
